# SonarQube Cloud configuration for the Vacature Explorer front-end.
# Docs: https://docs.sonarsource.com/sonarqube-cloud/
#
# All paths are relative to this file (the scan runs with
# projectBaseDir = vacature-app, set in .github/workflows/sonarcloud.yml).

# --- Project identity (verify these match your SonarQube Cloud project) -------
sonar.organization=blodowica
sonar.projectKey=Blodowica_Vacatures-app
sonar.projectName=Vacatures-app

# --- What is product code vs test code ---------------------------------------
sonar.sources=src
sonar.tests=src,cypress
sonar.test.inclusions=src/**/*.spec.ts,src/tests/**/*.ts,cypress/**/*.ts
# Remove the test files from the main source set so they aren't indexed twice.
sonar.exclusions=src/**/*.spec.ts,src/tests/**/*

# --- Coverage (LCOV produced by `npm run test:coverage`) ----------------------
sonar.javascript.lcov.reportPaths=coverage/vacature-app/lcov.info
# Files that should not count against coverage (no meaningful unit coverage):
sonar.coverage.exclusions=src/**/*.spec.ts,src/tests/**/*,cypress/**/*,src/environments/**,src/main.ts,src/main.server.ts,src/server.ts,src/app/app.config.server.ts,src/app/app.routes.server.ts

# --- Misc --------------------------------------------------------------------
sonar.sourceEncoding=UTF-8
