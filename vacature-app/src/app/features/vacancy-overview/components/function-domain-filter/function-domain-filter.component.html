<mat-chip-listbox
  [value]="filterService.functionDomain()"
  [multiple]="true"
  (change)="onChange($event)"
  aria-label="Functiedomein"
  class="chip-list"
  data-cy="domain-filter"
>
  @for (domain of domains(); track domain) {
    <mat-chip-option [value]="domain" data-cy="domain-option">{{ domain }}</mat-chip-option>
  }
</mat-chip-listbox>
