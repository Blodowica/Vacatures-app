# Local, self-hosted SonarQube server (Community Edition).
#
# This is the SAME analysis as SonarQube Cloud, just running on your machine so
# results stay local. SonarCloud (see .github/workflows/sonarcloud.yml) keeps
# working unchanged — this is an additional, local target.
#
#   Start:   docker compose -f docker-compose.sonarqube.yml up -d
#   Open:    http://localhost:9000   (first login admin / admin, then change it)
#   Stop:    docker compose -f docker-compose.sonarqube.yml down
#   Wipe:    docker compose -f docker-compose.sonarqube.yml down -v   (deletes all data)
#
# Data is persisted in named volumes below, so analyses survive restarts.
# If SonarQube fails to start with an Elasticsearch "max virtual memory" error,
# raise the host limit (WSL2/Linux): `sudo sysctl -w vm.max_map_count=262144`.

services:
  sonarqube:
    image: sonarqube:community
    container_name: vacatures-sonarqube
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  db:
    image: postgres:16
    container_name: vacatures-sonarqube-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql_data:
